name: Publish Application

# Allows manual triggering
on:
  workflow_dispatch:

jobs:
  determine_version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0 # Fetch all history for GitVersion

    - name: Remove PR refs to avoid GitVersion ambiguity
      run: |
        git config --replace-all remote.origin.fetch '+refs/heads/*:refs/remotes/origin/*'
        git config --add remote.origin.fetch '+refs/tags/*:refs/tags/*'
        git fetch --prune origin

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: "./global.json"

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v4.4.2
      with:
        versionSpec: '6.3.x'
        includePrerelease: true

    - name: Determine Version
      id: gitversion
      uses: gittools/actions/gitversion/execute@v4.4.2

    - name: Display GitVersion outputs (for debugging)
      run: |
        echo "Determined SemVer: ${{ steps.gitversion.outputs.semVer }}"

  publish:
    name: Publish Application
    needs: determine_version # Depends on the version determination job
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            runtime: linux-x64
          - os: ubuntu-latest
            runtime: linux-arm64
          - os: windows-latest
            runtime: win-x64
          - os: windows-latest
            runtime: win-arm64
          - os: macos-latest
            runtime: osx-x64
          - os: macos-latest
            runtime: osx-arm64
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6 # Checkout code again for this job
      with:
        fetch-depth: 0 # Fetch all history for GitVersion
        ref: ${{ github.ref }} # Ensure the correct ref is checked out
        fetch-tags: true # Explicitly fetch all tags

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: "./global.json"

    # Restore might be needed before publish if not implicitly done
    - name: Restore dependencies
      run: dotnet restore

    - name: Publish (${{ matrix.runtime }})
      run: |
        dotnet publish src/MainApp/CrowsNestMqtt.App.csproj --configuration Release --runtime ${{ matrix.runtime }} --self-contained -p:PublishSingleFile=true -o ./publish/${{ matrix.runtime }}/ --no-restore -p:Version=${{ needs.determine_version.outputs.semVer }}

    - name: Create macOS DMG (${{ matrix.runtime }})
      if: matrix.runtime == 'osx-x64' || matrix.runtime == 'osx-arm64'
      run: |
        ./tools/create-macos-dmg.sh ./publish/${{ matrix.runtime }} ${{ matrix.runtime }} ${{ needs.determine_version.outputs.semVer }} CrowsNestMqtt.App

    - name: Upload Application (${{ matrix.runtime }})
      if: matrix.runtime != 'osx-x64' && matrix.runtime != 'osx-arm64'
      uses: actions/upload-artifact@v4
      with:
        name: crows-nest-mqtt-${{ matrix.runtime }}-${{ needs.determine_version.outputs.semVer }} # Use version from needs context
        path: ./publish/${{ matrix.runtime }}
        if-no-files-found: error

    - name: Upload macOS DMG (${{ matrix.runtime }})
      if: matrix.runtime == 'osx-x64' || matrix.runtime == 'osx-arm64'
      uses: actions/upload-artifact@v4
      with:
        name: crows-nest-mqtt-${{ matrix.runtime }}-${{ needs.determine_version.outputs.semVer }} # Use version from needs context
        path: ./publish/${{ matrix.runtime }}/*.dmg
        if-no-files-found: error

    # MSIX packaging for Windows runtimes
    - name: Publish for MSIX (${{ matrix.runtime }})
      if: matrix.runtime == 'win-x64' || matrix.runtime == 'win-arm64'
      run: |
        dotnet publish src/MainApp/CrowsNestMqtt.App.csproj --configuration Release --runtime ${{ matrix.runtime }} --self-contained -o ./publish/msix-${{ matrix.runtime }}/ --no-restore -p:Version=${{ needs.determine_version.outputs.semVer }}

    - name: Create MSIX Package (${{ matrix.runtime }})
      if: matrix.runtime == 'win-x64' || matrix.runtime == 'win-arm64'
      shell: pwsh
      run: |
        $arch = '${{ matrix.runtime }}' -replace 'win-', ''
        .\tools\Create-MsixPackage.ps1 `
          -PublishDir "./publish/msix-${{ matrix.runtime }}" `
          -Version "${{ needs.determine_version.outputs.semVer }}" `
          -Architecture $arch `
          -OutputPath "./publish/msix/CrowsNestMqtt-$arch-${{ needs.determine_version.outputs.semVer }}.msix"

    - name: Upload MSIX (${{ matrix.runtime }})
      if: matrix.runtime == 'win-x64' || matrix.runtime == 'win-arm64'
      uses: actions/upload-artifact@v4
      with:
        name: crows-nest-mqtt-msix-${{ matrix.runtime }}-${{ needs.determine_version.outputs.semVer }}
        path: ./publish/msix/*.msix
        if-no-files-found: error
  
  msix_bundle:
    name: Create MSIX Bundle
    runs-on: windows-latest
    needs:
      - determine_version
      - publish
    steps:
    - uses: actions/checkout@v6

    - name: Download win-x64 MSIX
      uses: actions/download-artifact@v4
      with:
        name: crows-nest-mqtt-msix-win-x64-${{ needs.determine_version.outputs.semVer }}
        path: ./msix-inputs/

    - name: Download win-arm64 MSIX
      uses: actions/download-artifact@v4
      with:
        name: crows-nest-mqtt-msix-win-arm64-${{ needs.determine_version.outputs.semVer }}
        path: ./msix-inputs/

    - name: Create MSIX Bundle
      shell: pwsh
      run: |
        $msixFiles = Get-ChildItem -Path ./msix-inputs -Filter *.msix | Select-Object -ExpandProperty FullName
        .\tools\Create-MsixBundle.ps1 `
          -MsixFiles $msixFiles `
          -OutputPath "./publish/bundle/CrowsNestMqtt-${{ needs.determine_version.outputs.semVer }}.msixbundle"

    - name: Upload MSIX Bundle
      uses: actions/upload-artifact@v4
      with:
        name: crows-nest-mqtt-msixbundle-${{ needs.determine_version.outputs.semVer }}
        path: ./publish/bundle/*.msixbundle
        if-no-files-found: error

  release:
    name: Create Release Notes
    runs-on: ubuntu-latest
    needs: 
     - determine_version
     - publish
     - msix_bundle
    permissions:
      contents: write
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./release/
         
    - name: Zip all subfolders
      run: |
        cd ./release/
        mkdir -p ../zipped-releases
        for dir in */; do
          if compgen -G "${dir}*.dmg" > /dev/null; then
            cp "${dir}"*.dmg ../zipped-releases/
          elif compgen -G "${dir}*.msixbundle" > /dev/null; then
            cp "${dir}"*.msixbundle ../zipped-releases/
          else
            zip -r "../zipped-releases/${dir%/}.zip" "$dir"
          fi
        done
        cd ..
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: github.ref_type == 'tag'
      with:
        generate_release_notes: true
        draft: true
        append_body: true
        files: |
          ./zipped-releases/*.zip
          ./zipped-releases/*.dmg
          ./zipped-releases/*.msixbundle
